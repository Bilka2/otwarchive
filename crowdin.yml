project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

skip_untranslated_strings: 1
preserve_hierarchy: true
base_path: config/locales
files:
  - source: /controllers/en.json
    translation: /crowdin-exports/controllers/%two_letters_code%.json
  - source: /devise/en.json
    translation: /crowdin-exports/devise/%two_letters_code%.json
  - source: /helpers/en.json
    translation: /crowdin-exports/helpers/%two_letters_code%.json
  - source: /mailers/en.json
    translation: /crowdin-exports/mailers/%two_letters_code%.json
  - source: /models/en.json
    translation: /crowdin-exports/models/%two_letters_code%.json
  - source: /validators/en.json
    translation: /crowdin-exports/validators/%two_letters_code%.json
  - source: /views/en.json
    translation: /crowdin-exports/views/%two_letters_code%.json
